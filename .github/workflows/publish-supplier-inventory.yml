name: Publish supplier inventory

on:
  workflow_dispatch:
    inputs:
      check_in:
        description: Optional stay check-in date for coverage gating, such as 2026-06-06
        required: false
        type: string
      check_out:
        description: Optional stay check-out date for coverage gating, such as 2026-06-07
        required: false
        type: string
  schedule:
    - cron: '23 18 * * *'

permissions:
  contents: write

concurrency:
  group: supplier-inventory-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HOTEL_SUPPLIER_INVENTORY_INPUTS_JSON: ${{ secrets.HOTEL_SUPPLIER_INVENTORY_INPUTS_JSON }}
      HOTEL_SUPPLIER_INVENTORY_INPUTS: ${{ secrets.HOTEL_SUPPLIER_INVENTORY_INPUTS }}
      HOTEL_SUPPLIER_INVENTORY_INPUT: ${{ secrets.HOTEL_SUPPLIER_INVENTORY_INPUT }}
      HOTEL_SUPPLIER_INVENTORY_HEADERS_JSON: ${{ secrets.HOTEL_SUPPLIER_INVENTORY_HEADERS_JSON }}
      HOTEL_SUPPLIER_INVENTORY_HEADERS: ${{ secrets.HOTEL_SUPPLIER_INVENTORY_HEADERS }}
      HOTEL_SUPPLIER_FIELD_MAP_JSON: ${{ secrets.HOTEL_SUPPLIER_FIELD_MAP_JSON }}
      HOTEL_SUPPLIER_FIELD_MAP: ${{ secrets.HOTEL_SUPPLIER_FIELD_MAP }}
      HOTEL_SUPPLIER_CHECK_IN: ${{ github.event.inputs.check_in || vars.HOTEL_SUPPLIER_CHECK_IN || '' }}
      HOTEL_SUPPLIER_CHECK_OUT: ${{ github.event.inputs.check_out || vars.HOTEL_SUPPLIER_CHECK_OUT || '' }}
      HOTEL_SUPPLIER_MIN_HOTELS_PER_CITY: ${{ vars.HOTEL_SUPPLIER_MIN_HOTELS_PER_CITY || '1' }}
      HOTEL_SUPPLIER_MIN_ROWS_PER_CITY: ${{ vars.HOTEL_SUPPLIER_MIN_ROWS_PER_CITY || '1' }}
      HOTEL_SUPPLIER_MIN_PRICED_HOTELS_PER_CITY: ${{ vars.HOTEL_SUPPLIER_MIN_PRICED_HOTELS_PER_CITY || '1' }}
      HOTEL_SUPPLIER_MIN_PRICED_ROWS_PER_CITY: ${{ vars.HOTEL_SUPPLIER_MIN_PRICED_ROWS_PER_CITY || '1' }}
      HOTEL_SUPPLIER_MAX_PRICE_AGE_HOURS: ${{ vars.HOTEL_SUPPLIER_MAX_PRICE_AGE_HOURS || '' }}
      HOTEL_SUPPLIER_FRESHNESS_REFERENCE_TIME: ${{ vars.HOTEL_SUPPLIER_FRESHNESS_REFERENCE_TIME || '' }}
      HOTEL_SUPPLIER_INVENTORY_BASE_URL: ${{ vars.HOTEL_SUPPLIER_INVENTORY_BASE_URL || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check supplier inventory configuration
        id: config
        run: |
          if [ -z "$HOTEL_SUPPLIER_INVENTORY_INPUTS_JSON" ] && [ -z "$HOTEL_SUPPLIER_INVENTORY_INPUTS" ] && [ -z "$HOTEL_SUPPLIER_INVENTORY_INPUT" ]; then
            echo "::notice title=Supplier inventory not configured::Set HOTEL_SUPPLIER_INVENTORY_INPUTS_JSON or HOTEL_SUPPLIER_INVENTORY_INPUTS in repository secrets."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.config.outputs.configured == 'true'
        run: npm test

      - name: Publish supplier inventory
        if: steps.config.outputs.configured == 'true'
        run: npm run publish:supplier-inventory:env

      - name: Check generated changes
        if: steps.config.outputs.configured == 'true'
        run: git diff --check

      - name: Commit published inventory
        if: steps.config.outputs.configured == 'true'
        run: |
          if [ -z "$(git status --short -- public docs)" ]; then
            echo "::notice title=Supplier inventory unchanged::No generated Pages changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public docs
          git commit -m "Publish supplier inventory"
          git push
